<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Sprout Fairy - Idle Frame -->
  <!-- Leaf wings -->
  <rect x="7" y="8" width="4" height="2" fill="#43A047"/>
  <rect x="6" y="9" width="3" height="2" fill="#388E3C"/>
  <rect x="21" y="8" width="4" height="2" fill="#43A047"/>
  <rect x="23" y="9" width="3" height="2" fill="#388E3C"/>
  <!-- Body -->
  <rect x="13" y="8" width="6" height="7" fill="#FFCC80"/>
  <rect x="12" y="9" width="8" height="5" fill="#FFCC80"/>
  <!-- Leaf hat -->
  <rect x="14" y="6" width="4" height="2" fill="#66BB6A"/>
  <rect x="15" y="5" width="2" height="2" fill="#81C784"/>
  <rect x="16" y="4" width="1" height="2" fill="#A5D6A7"/>
  <!-- Eyes -->
  <rect x="14" y="10" width="2" height="2" fill="#3E2723"/>
  <rect x="18" y="10" width="2" height="2" fill="#3E2723"/>
  <rect x="15" y="10" width="1" height="1" fill="#FFFFFF"/>
  <rect x="19" y="10" width="1" height="1" fill="#FFFFFF"/>
  <!-- Smile -->

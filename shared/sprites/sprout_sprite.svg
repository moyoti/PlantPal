  <rect x="11" y="16" width="10" height="2" fill="#BA68C8"/>
  <rect x="12" y="18" width="8" height="1" fill="#AB47BC"/>
  <!-- Legs -->
  <rect x="14" y="19" width="1" height="2" fill="#FFCC80"/>
  <rect x="17" y="19" width="1" height="2" fill="#FFCC80"/>
  <!-- Feet -->
  <rect x="13" y="21" width="2" height="1" fill="#8D6E63"/>
  <rect x="17" y="21" width="2" height="1" fill="#8D6E63"/>
